# =============================================================================
# Build and Push llama.cpp inference-worker to Docker Hub
#
# Pre-downloads a GGUF model at build time so it's baked into the image.
# Configure the model by editing the env vars at the top of this file.
#
# Required secrets:
#   DOCKERHUB_USER     - Docker Hub username
#   DOCKERHUB_PASSWORD - Docker Hub password or access token
# =============================================================================

name: Build and Push to Docker Hub

on:
  push:
    branches:
      - main
  # Allow manual trigger with custom model settings
  workflow_dispatch:
    inputs:
      hf_model_url:
        description: "Hugging Face direct download URL for the GGUF model"
        required: true
        type: string
      model_filename:
        description: "GGUF filename (e.g., gemma-3-270m-it-Q8_0.gguf)"
        required: true
        type: string
      docker_tag:
        description: "Docker image tag (e.g., gemma-3-270m-it-q8)"
        required: true
        type: string
      llama_server_args:
        description: "Default llama-server arguments"
        required: false
        type: string
        default: "--ctx-size 4096 -ngl 999 -fa"

env:
  HF_MODEL_URL: "https://huggingface.co/mradermacher/gemma-4-26B-A4B-it-SOMPOA-heresy-GGUF/resolve/main/gemma-4-26B-A4B-it-SOMPOA-heresy.Q4_K_M.gguf"
  MODEL_FILENAME: "gemma-4-26b-sompoa.gguf"
  DOCKER_TAG: "gemma-4-26b-sompoa"
  LLAMA_SERVER_ARGS: "--ctx-size 4096 -ngl 999 -fa"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Free Disk Space for Docker
        uses: endersonmenezes/free-disk-space@v3
        with:
          remove_android: true
          remove_dotnet: true
          remove_haskell: true
          remove_packages: "azure-cli google-cloud-cli microsoft-edge-stable google-chrome-stable firefox postgresql* temurin-* *llvm* mysql* dotnet-sdk-*"
          remove_folders: "/usr/share/swift /usr/share/miniconda /usr/share/az* /usr/local/lib/node_modules /usr/local/share/chromium /usr/local/share/powershell /usr/local/julia /usr/local/aws-cli /usr/local/aws-sam-cli /usr/share/gradle"
          rm_cmd: "rmz"

      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Determine build args
        id: args
        shell: bash
        run: |
          # Use workflow_dispatch inputs if provided, otherwise fall back to env vars
          HF_URL="${{ inputs.hf_model_url || env.HF_MODEL_URL }}"
          FILENAME="${{ inputs.model_filename || env.MODEL_FILENAME }}"
          TAG="${{ inputs.docker_tag || env.DOCKER_TAG }}"
          SERVER_ARGS="${{ inputs.llama_server_args || env.LLAMA_SERVER_ARGS }}"

          echo "hf_model_url=${HF_URL}" >> "$GITHUB_OUTPUT"
          echo "model_filename=${FILENAME}" >> "$GITHUB_OUTPUT"
          echo "docker_tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "llama_server_args=${SERVER_ARGS}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          provenance: false
          tags: ${{ secrets.DOCKERHUB_USER }}/inference-worker-llamacpp:${{ steps.args.outputs.docker_tag }}
          build-args: |
            HF_MODEL_URL=${{ steps.args.outputs.hf_model_url }}
            MODEL_FILENAME=${{ steps.args.outputs.model_filename }}
            LLAMA_SERVER_ARGS=${{ steps.args.outputs.llama_server_args }}
          cache-from: type=gha
          cache-to: type=gha,mode=min,compression=zstd